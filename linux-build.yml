name: Build Linux Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Create Debian Package
        run: |
          # Package name and version
          APP_NAME="aozora-accounts"
          VERSION="1.0.0"
          ARCH="amd64"
          
          # Create directory structure
          mkdir -p debian/usr/bin
          mkdir -p debian/usr/lib/$APP_NAME
          mkdir -p debian/usr/share/applications
          mkdir -p debian/usr/share/icons/hicolor/scalable/apps
          mkdir -p debian/DEBIAN
          
          # Copy binary and assets
          cp -r build/linux/x64/release/bundle/* debian/usr/lib/$APP_NAME/
          ln -s /usr/lib/$APP_NAME/aozora_accounts debian/usr/bin/$APP_NAME
          
          # Copy icon if available
          if [ -f "assets/Aozora.svg" ]; then
            cp assets/Aozora.svg debian/usr/share/icons/hicolor/scalable/apps/$APP_NAME.svg
          fi
          
          # Create control file
          cat <<EOF > debian/DEBIAN/control
          Package: $APP_NAME
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: $ARCH
          Maintainer: Aozora Team
          Description: Aozora Accounts - Enterprise Management App
          EOF
          
          # Create desktop entry
          cat <<EOF > debian/usr/share/applications/$APP_NAME.desktop
          [Desktop Entry]
          Name=Aozora Accounts
          Comment=Enterprise Management everywhere you work
          Exec=$APP_NAME
          Icon=$APP_NAME
          Terminal=false
          Type=Application
          Categories=Office;Finance;
          EOF
          
          # Build .deb
          dpkg-deb --build debian "${APP_NAME}_${VERSION}_${ARCH}.deb"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: "*.deb"
